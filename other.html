<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" type="image/png" href="photos/r_icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Assorted photography by Rowan Potts." />
  <title>Assorted | Rowan Potts Photography</title>
  <link rel="stylesheet" href="gallery_page.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Ramaraja&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />
  <script src="gallery-lightbox.js" defer></script>
</head>

<body id="top">
  <div class="page">
    <header class="topbar">
      <a class="brand" href="/">Rowan Potts Photography</a>
      <input class="nav_toggle" type="checkbox" id="other_nav_toggle" />
      <label class="menu_tab" for="other_nav_toggle" aria-label="Toggle navigation menu">
        <span class="sr_only">Toggle navigation menu</span>
        <span class="menu_icon" aria-hidden="true"><span></span><span></span><span></span></span>
      </label>
      <nav class="links_list" aria-label="Primary navigation">
        <a href="galleries">Galleries</a>
        <a href="about">About</a>
        <a href="contact">Contact</a>
        <a href="https://www.instagram.com/pottsey.photos/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </header>

    <main>
      <section class="photo_container" aria-label="Assorted photos">
        <div class="gallery_masonry">
          <img class="image" src="other/ASPCA-22.jpg" alt="Assorted photo 1" loading="lazy" />
          <img class="image" src="other/ASPCA-4.jpg" alt="Assorted photo 2" loading="lazy" />
          <img class="image" src="other/cat-3_50.jpg" alt="Assorted photo 3" loading="lazy" />
          <img class="image" src="other/resized_bug_photo-2.jpg" alt="Assorted photo 4" loading="lazy" />
          <img class="image" src="other/resized_butterfly-2.jpg" alt="Assorted photo 5" loading="lazy" />
          <img class="image" src="other/resized_charlie-2.jpg" alt="Assorted photo 6" loading="lazy" />
          <img class="image" src="other/resized_concert_photo-2.jpg" alt="Assorted photo 7" loading="lazy" />
          <img class="image" src="other/resized_eagle-2.jpg" alt="Assorted photo 8" loading="lazy" />
          <img class="image" src="other/resized_Greek_Sing-1.jpg" alt="Assorted photo 9" loading="lazy" />
          <img class="image" src="other/resized_hiking-2.jpg" alt="Assorted photo 10" loading="lazy" />
          <img class="image" src="other/resized_JMU_Students-7.jpg" alt="Assorted photo 11" loading="lazy" />
          <img class="image" src="other/resized_lights-2.jpg" alt="Assorted photo 12" loading="lazy" />
          <img class="image" src="other/resized_river_photo-2.jpg" alt="Assorted photo 13" loading="lazy" />
          <img class="image" src="other/resized_sarah_hiking-2.jpg" alt="Assorted photo 14" loading="lazy" />
          <img class="image" src="other/resized_skeleton_lightpainting-2.jpg" alt="Assorted photo 15" loading="lazy" />
        </div>
      </section>
    </main>

    <a href="#top" class="top_button">Top</a>
    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox_close" id="lightbox_close" type="button" aria-label="Close fullscreen preview">X</button>
      <img class="lightbox_image" id="lightbox_image" src="" alt="" />
    </div>
  </div>
</body>

</html>
