<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" type="image/png" href="photos/r_icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="keywords" content="Rowan Potts, Photography, Galleries, Portfolio" />
  <meta name="description" content="Browse Rowan Potts Photography galleries by category." />
  <title>Galleries | Rowan Potts Photography</title>
  <link rel="stylesheet" href="gallery_list.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Ramaraja&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Rowan Potts Photography home">Rowan Potts Photography</a>

      <input class="nav_toggle" type="checkbox" id="gallery_list_nav_toggle" />
      <label class="menu_tab" for="gallery_list_nav_toggle" aria-label="Toggle navigation menu">
        <span class="sr_only">Toggle navigation menu</span>
        <span class="menu_icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </label>

      <nav class="links_list" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="about">About</a>
        <a href="contact">Contact</a>
        <a href="https://www.instagram.com/pottsey.photos/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </header>

    <main>
      <section class="list_hero" aria-labelledby="gallery_list_title">
        <img
          class="list_hero_image"
          src="football/app_state/top/app_state-41.jpg"
          alt="Football game action"
        />
        <div class="list_hero_shade" aria-hidden="true"></div>
        <div class="list_hero_content">
          <h1 id="gallery_list_title">Galleries</h1>
          <p>Browse my portfolio</p>
        </div>
      </section>

      <section class="gallery_list_section" aria-label="Gallery categories">
        <article class="gallery_card">
          <a href="football">
            <img src="football/troy/top/jmutroy-50.jpg" alt="Football gallery preview" loading="lazy" />
            <span>Football</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="graduation">
            <img src="graduation/Elizabeth-Fowler-Graduation (26 of 80).jpg" alt="Graduation gallery preview" loading="lazy" />
            <span>Graduation</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="basketball">
            <img src="basketball/wbb.jpg" alt="Basketball gallery preview" loading="lazy" />
            <span>Basketball</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="myers-farm">
            <img src="myers_farm/myfarm-3.jpg" alt="Myers Farm gallery preview" loading="lazy" />
            <span>Myers Farm</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="baseball">
            <img src="baseball/crop (1 of 1).jpg" alt="Baseball gallery preview" loading="lazy" />
            <span>Baseball</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="softball">
            <img src="softball/wsoftballlousiana/RPP_WSOFTBALL_LOUISIANA-13.jpg" alt="Softball gallery preview" loading="lazy" />
            <span>Softball</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="portrait">
            <img src="portrait/resized_sunset_silhouette-1.jpg" alt="Portrait gallery preview" loading="lazy" />
            <span>Portrait</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="downtown-gallery">
            <img src="downtown_gallary/dthp-15.jpg" alt="Downtown Harrisonburg gallery preview" loading="lazy" />
            <span>Downtown Harrisonburg Gallery</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="other">
            <img src="other/resized_JMU_Students-7.jpg" alt="Assorted gallery preview" loading="lazy" />
            <span>Assorted</span>
          </a>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p>Rowan Potts Photography</p>
      <a href="contact">Contact</a>
    </footer>
  </div>
</body>

</html>
