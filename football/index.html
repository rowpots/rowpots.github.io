<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" type="image/png" href="/photos/r_icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Football game galleries by Rowan Potts." />
  <title>Football | Rowan Potts Photography</title>
  <link rel="stylesheet" href="/gallery_list.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Ramaraja&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <div class="page">
    <header class="topbar">
      <a class="brand" href="/">Rowan Potts Photography</a>
      <input class="nav_toggle" type="checkbox" id="football_nav_toggle" />
      <label class="menu_tab" for="football_nav_toggle" aria-label="Toggle navigation menu">
        <span class="sr_only">Toggle navigation menu</span>
        <span class="menu_icon" aria-hidden="true"><span></span><span></span><span></span></span>
      </label>
      <nav class="links_list" aria-label="Primary navigation">
        <a href="/galleries">Galleries</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="https://www.instagram.com/pottsey.photos/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </header>

    <main>
      <section class="list_hero" aria-labelledby="football_title">
        <img
          class="list_hero_image"
          src="/football/app_state/app_state-4.jpg"
          alt="Football game action"
        />
        <div class="list_hero_shade" aria-hidden="true"></div>
        <div class="list_hero_content">
          <h1 id="football_title">Football</h1>
          <p>Game galleries</p>
        </div>
      </section>

      <section class="gallery_list_section football_gallery_list" aria-label="Football game galleries">
        <h2 class="gallery_year_heading">2025</h2>
        <article class="gallery_card">
          <a href="/football-app-state">
            <img src="/football/app_state/top/app_state-41.jpg" alt="App State football gallery preview" loading="lazy" />
            <span>JMU vs. App State</span>
          </a>
        </article>
        <article class="gallery_card">
          <a href="/football-troy">
            <img src="/football/troy/top/jmutroy-50.jpg" alt="Troy football gallery preview" loading="lazy" />
            <span>JMU vs. Troy</span>
          </a>
        </article>
      </section>
    </main>

    <footer class="footer">
      <p>Rowan Potts Photography</p>
      <a href="/contact">Contact</a>
    </footer>
  </div>
</body>

</html>
