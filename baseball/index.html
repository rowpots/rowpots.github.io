<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" type="image/png" href="/photos/r_icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Baseball photography by Rowan Potts." />
  <title>Baseball | Rowan Potts Photography</title>
  <link rel="stylesheet" href="/gallery_page.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Ramaraja&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet"
  />
  <script src="/gallery-lightbox.js" defer></script>
</head>

<body id="top">
  <div class="page">
    <header class="topbar">
      <a class="brand" href="/">Rowan Potts Photography</a>
      <input class="nav_toggle" type="checkbox" id="baseball_nav_toggle" />
      <label class="menu_tab" for="baseball_nav_toggle" aria-label="Toggle navigation menu">
        <span class="sr_only">Toggle navigation menu</span>
        <span class="menu_icon" aria-hidden="true"><span></span><span></span><span></span></span>
      </label>
      <nav class="links_list" aria-label="Primary navigation">
        <a href="/galleries">Galleries</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="https://www.instagram.com/pottsey.photos/" target="_blank" rel="noopener noreferrer">Instagram</a>
      </nav>
    </header>

    <main>
      <section class="photo_container" aria-label="Baseball photos">
        <div class="gallery_masonry">
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA.jpg" alt="Baseball photo 1" loading="lazy" />
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA-2.jpg" alt="Baseball photo 2" loading="lazy" />
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA-3.jpg" alt="Baseball photo 3" loading="lazy" />
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA-4.jpg" alt="Baseball photo 4" loading="lazy" />
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA-5.jpg" alt="Baseball photo 5" loading="lazy" />
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA-6.jpg" alt="Baseball photo 6" loading="lazy" />
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA-7.jpg" alt="Baseball photo 7" loading="lazy" />
          <img class="image" src="/baseball/RPP_MBBALL_LOUISIANA-8.jpg" alt="Baseball photo 8" loading="lazy" />
        </div>
      </section>
    </main>

    <a href="#top" class="top_button">Top</a>
    <div class="lightbox" id="lightbox" aria-hidden="true">
      <button class="lightbox_close" id="lightbox_close" type="button" aria-label="Close fullscreen preview">X</button>
      <img class="lightbox_image" id="lightbox_image" src="" alt="" />
    </div>
  </div>
</body>

</html>
